          s=s.replace(marker,pending,1)
          p.write_text(s)
          PY
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/pages/Products.jsx
          git diff --cached --quiet && exit 0

          s=s.replace(old,new,1)
          marker="""  if (!hasCampaign) {
    return (
"""
          pending="""  if (String(product?.campaign_status || '').toLowerCase() === 'incomplete') {
    return (
      <div className=\"flex items-center gap-1.5\">

name: Aplicar navegação consolidada

on:
  push:
    branches:
      - feat/consolidar-sala-controle
    paths:
      - scripts/consolidate-sala-navigation.mjs
      - .github/workflows/apply-sala-navigation.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip nav migration]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/consolidar-sala-controle
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aplicar migração
        run: node scripts/consolidate-sala-navigation.mjs

      - name: Instalar dependências
        run: npm ci

      - name: Validar build
        run: npm run build

      - name: Commitar alteração gerada
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração pendente."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/SalaDeComando.jsx
          git commit -m "feat: consolidar abas da sala de controle [skip nav migration]"
          git push origin HEAD:feat/consolidar-sala-controle

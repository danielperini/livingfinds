<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="language" content="pt-BR" />
    <meta name="description" content="Living Finds — Gestão de produtos, estoque e anúncios da Amazon" />
    <link rel="manifest" href="/manifest.json" />
    <title>Living Finds — Gestão Amazon</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        let applying = false;

        const applyDashboardChartAdjustments = () => {
          if (applying) return;
          applying = true;

          try {
            const headings = Array.from(document.querySelectorAll('h2'));

            const consolidatedTitle = headings.find((node) => {
              const title = node.textContent?.trim();
              return title === 'Gasto · Vendas · Faturamento Real'
                || title === 'Gasto Vendas Cliques Impressões e IA';
            });

            if (consolidatedTitle) {
              consolidatedTitle.textContent = 'Gasto Vendas Cliques Impressões e IA';
              const card = consolidatedTitle.closest('.bg-surface-1');

              if (card) {
                Array.from(card.querySelectorAll('span')).forEach((node) => {
                  if (node.textContent?.trim().startsWith('Fat. Real:')) node.remove();
                });

                const description = Array.from(card.querySelectorAll('p')).find((node) =>
                  node.textContent?.includes('Todo o histórico disponível')
                );

                if (description) {
                  Array.from(description.querySelectorAll('span')).forEach((node) => {
                    if (node.textContent?.includes('curva laranja = faturamento real')) {
                      const previousText = node.previousSibling;
                      if (previousText?.nodeType === Node.TEXT_NODE) {
                        previousText.textContent = previousText.textContent.replace(/\s*·\s*$/, '');
                      }
                      node.remove();
                    }
                  });
                }

                card.querySelectorAll(
                  'svg path[stroke="#FB923C"], svg path[stroke="#fb923c"], svg path[stroke="rgb(251, 146, 60)"]'
                ).forEach((path) => {
                  path.style.display = 'none';
                  path.setAttribute('aria-hidden', 'true');
                });
              }
            }

            const comparisonTitle = headings.find((node) => {
              const title = node.textContent?.trim();
              return title === 'Comparação mês atual vs mês anterior'
                || title === 'Faturamento Atual x Mês Anterior'
                || title === 'Faturamento x Mês Anterior';
            });

            if (comparisonTitle) {
              comparisonTitle.textContent = 'Faturamento x Mês Anterior';
              const comparisonCard = comparisonTitle.closest('.bg-surface-1');
              if (comparisonCard) {
                Array.from(comparisonCard.querySelectorAll('button')).forEach((button) => {
                  if (button.textContent?.trim() === 'Faturamento Real') {
                    button.textContent = 'Faturamento x mês anterior';
                  }
                });
              }
            }
          } finally {
            applying = false;
          }
        };

        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(applyDashboardChartAdjustments);
        });
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['stroke'],
        });

        window.addEventListener('DOMContentLoaded', applyDashboardChartAdjustments);
        window.setTimeout(applyDashboardChartAdjustments, 250);
        window.setTimeout(applyDashboardChartAdjustments, 1000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
